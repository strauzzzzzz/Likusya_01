<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>Likusya | Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="background-circles">
            <div class="circle c1"></div>
            <div class="circle c2"></div>
            <div class="circle c3"></div>
            <div class="circle c4"></div>
        </div>
        
        <h1 class="header-text">УСТАНОВКА<br>ПРИЛОЖЕНИЙ<br>НА АЙФОН</h1>

        <div class="profile-card glass-panel">
            <img src="https://via.placeholder.com/64" alt="Ликуся Аватар" class="profile-pic">
            <div class="profile-info">
                <p class="profile-name">Likusya | С ТТ СЮДА</p>
                <p class="profile-status">В сети</p>
            </div>
        </div>

        <div class="button-group">
            <button class="glass-button download-ios" onclick="openLinkIos()">Скачать на iOS</button>
            <button class="glass-button contact" onclick="openLinkWrite()">Написать</button>
        </div>

        <div class="footer-text">
            @Likusya_01
        </div>
    </div>

    <script>
        // Инициализация TMA
        const tg = window.Telegram.WebApp;
        
        // Развернуть TMA на весь экран
        tg.expand();
        
        // --- ФУНКЦИИ ДЛЯ КНОПОК ---
        // ЗАМЕНИТИ ЭТИ ССЫЛКИ НА СВОИ!
        
        function openLinkIos() {
            // Ссылка 1: Скачать на iOS
            const link1 = "https://t.me/Likusya_01?text=%D0%9F%D1%80%D0%B8%D0%B2%D0%B5%D1%82!!%20%D0%A5%D0%BE%D1%87%D1%83%20%D1%83%D1%81%D1%82%D0%B0%D0%BD%D0%BE%D0%B2%D0%B8%D1%82%D1%8C%20%D1%83%20%D1%82%D0%B5%D0%B1%D1%8F%20%D0%BF%D1%80%D0%B8%D0%BB%D0%BE%D0%B6%D0%B5%D0%BD%D0%B8%D0%B5%2C%20%D0%BF%D0%BE%D0%BC%D0%BE%D0%B6%D0%B5%D1%88%D1%8C%3F"; // ТВОЯ ССЫЛКА ЗДЕСЬ
            tg.openLink(link1, { try_instant_view: false });
        }

        function openLinkWrite() {
            // Ссылка 2: Написать
            const link2 = "https://t.me/Likusya_01?text=%D0%9F%D1%80%D0%B8%D0%B2%D0%B5%D1%82!!%20%D0%A5%D0%BE%D1%87%D1%83%20%D1%83%D1%81%D1%82%D0%B0%D0%BD%D0%BE%D0%B2%D0%B8%D1%82%D1%8C%20%D1%83%20%D1%82%D0%B5%D0%B1%D1%8F%20%D0%BF%D1%80%D0%B8%D0%BB%D0%BE%D0%B6%D0%B5%D0%BD%D0%B8%D0%B5%2C%20%D0%BF%D0%BE%D0%BC%D0%BE%D0%B6%D0%B5%D1%88%D1%8C%3F"; // ТВОЯ ССЫЛКА ЗДЕСЬ
            tg.openLink(link2, { try_instant_view: false });
        }
    </script>
</body>
</html>
